# Tiny Tapeout project information
project:
  title:        "Basic 4-bit ALU"
  author:       "Nathan Pham"
  discord:      ""
  description:  "A basic 4-bit ALU supporting ADD, SUB, AND, OR, XOR, NOT, shift left, and shift right"
  language:     "Verilog"
  clock_hz:     0       # Combinational design, no clock needed

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_alu"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "Operand B bit 0"
  ui[1]: "Operand B bit 1"
  ui[2]: "Operand B bit 2"
  ui[3]: "Operand B bit 3"
  ui[4]: "Operand A bit 0"
  ui[5]: "Operand A bit 1"
  ui[6]: "Operand A bit 2"
  ui[7]: "Operand A bit 3"

  # Outputs
  uo[0]: "Result bit 0"
  uo[1]: "Result bit 1"
  uo[2]: "Result bit 2"
  uo[3]: "Result bit 3"
  uo[4]: "Result bit 4"
  uo[5]: "Result bit 5"
  uo[6]: "Result bit 6"
  uo[7]: "Result bit 7"

  # Bidirectional pins
  uio[0]: "Opcode bit 0"
  uio[1]: "Opcode bit 1"
  uio[2]: "Opcode bit 2"
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
